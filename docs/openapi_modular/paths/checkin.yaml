post:
  summary: Capture / Check-in to a Sculpture
  description: |
    Perform physical verification by sending the explorer's current GPS location and a freshly captured photo.
    The Recognition Service verifies the photo matches the sculpture model embeddings within proximity.
  operationId: checkInSculpture
  security:
    - BearerAuth: []
  parameters:
    - name: id
      in: path
      required: true
      schema:
        type: string
        format: uuid
  requestBody:
    required: true
    content:
      multipart/form-data:
        schema:
          type: object
          required:
            - photo
            - latitude
            - longitude
          properties:
            photo:
              type: string
              format: binary
              description: Sighting image file (JPEG/PNG) to analyze.
            latitude:
              type: number
              format: float
              minimum: -90
              maximum: 90
              example: 3.4501
            longitude:
              type: number
              format: float
              minimum: -180
              maximum: 180
              example: -76.5332
  responses:
    '200':
      description: Verification outcome
      content:
        application/json:
          schema:
            type: object
            required:
              - success
              - similarity_score
            properties:
              success:
                type: boolean
                description: True if the image embedding matched and location was within threshold.
              similarity_score:
                type: number
                format: float
                description: Visual confidence score (0.0 to 1.0).
              unlocked_content:
                type: string
                description: Cultural facts or reward text if successfully captured for the first time.
              reward_badge:
                type: string
                description: Name of the badge unlocked, if any.
    '400':
      description: Invalid coordinates or image file format.
    '401':
      description: Authentication token missing or expired.
