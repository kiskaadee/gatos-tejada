list:
  get:
    summary: List All Cat Sculptures
    description: Returns list of all sculptures with names, locations, and current status (Single Source of Truth).
    operationId: listSculptures
    responses:
      '200':
        description: List of sculptures
        content:
          application/json:
            schema:
              type: array
              items:
                $ref: '../components/schemas.yaml#/Sculpture'

detail:
  get:
    summary: Get Sculpture Details
    description: Detailed information about a sculpture, historical context, artist, and unlockable audio guides.
    operationId: getSculptureById
    parameters:
      - name: id
        in: path
        required: true
        schema:
          type: string
          format: uuid
    responses:
      '200':
        description: Detailed sculpture object
        content:
          application/json:
            schema:
              $ref: '../components/schemas.yaml#/SculptureDetails'
      '404':
        description: Sculpture not found.
