openapi: 3.0.3
info:
  title: Novias del Gato API - Modular
  description: |
    Modular, service-oriented API contract for the "Novias del Gato" digital ecosystem in Cali, Colombia.
    This specification splits paths and components into separate domain files for enhanced maintainability.
  version: 1.0.0
servers:
  - url: https://api.gatos.cali.gov.co/v1
    description: Production Server
  - url: http://localhost:8000/v1
    description: Local Development Server

paths:
  /auth/login:
    $ref: 'paths/auth.yaml'
  
  /users/me:
    $ref: 'paths/users.yaml#/me'
  
  /users/me/collection:
    $ref: 'paths/users.yaml#/collection'
  
  /sculptures:
    $ref: 'paths/sculptures.yaml#/list'
  
  /sculptures/{id}:
    $ref: 'paths/sculptures.yaml#/detail'
  
  /sculptures/{id}/check-in:
    $ref: 'paths/checkin.yaml'
  
  /reports:
    $ref: 'paths/reports.yaml#/collection'
  
  /reports/{id}/verify:
    $ref: 'paths/reports.yaml#/verify'

components:
  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  responses:
    Unauthorized:
      description: Authentication token missing or expired.
    Forbidden:
      description: Insufficient permissions for this action.
